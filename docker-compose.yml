services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: fanpitch
      POSTGRES_USER: fanpitch
      POSTGRES_PASSWORD: fanpitch
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fanpitch"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ["8000:8000"]
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 fanpitch.asgi:application"

  worker:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]
    volumes:
      - .:/app
    command: celery -A fanpitch worker -l info

volumes:
  pgdata: {}
