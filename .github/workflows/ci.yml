name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Python (ruff + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit[toml]

      - name: ruff check
        run: ruff check apps/ fanpitch/

      - name: bandit (security linter)
        # B101 = use of assert (we keep asserts in non-test paths intentionally for invariants).
        # B404/B603/B607 = subprocess usage in deploy scripts — we never accept user input there.
        run: bandit -r apps/ fanpitch/ --skip B101,B404,B603,B607 -ll

  test:
    name: Test Python (pytest + Postgres + Redis)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fanpitch
          POSTGRES_USER: fanpitch
          POSTGRES_PASSWORD: fanpitch
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fanpitch"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DJANGO_SECRET_KEY: ci-test-secret-not-for-prod
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: fanpitch
      POSTGRES_USER: fanpitch
      POSTGRES_PASSWORD: fanpitch
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      REDIS_URL: redis://127.0.0.1:6379/0
      AWS_REGION: eu-central-1
      BEDROCK_ENABLED: "False"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Django check + migrations dry-run
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        # We have no pytest tests yet (hackathon polish item) — rely on the
        # Django self-check + makemigrations --check as a smoke test for now.
        # When tests land under apps/*/tests/, this step picks them up.
        run: |
          if find apps -name "test_*.py" -o -name "tests.py" 2>/dev/null | grep -q .; then
            pytest -x apps/ tests/
          else
            echo "No pytest tests yet — Django check + makemigrations served as smoke test."
          fi

  build-image:
    name: Build Docker image (verify Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: fanpitch-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  commitlint:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install commitlint
        run: |
          npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint PR commits
        run: |
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to   "${{ github.event.pull_request.head.sha }}" \
            --config <(echo "module.exports = {extends: ['@commitlint/config-conventional']};")
